<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מגלה פלינדרומים / תיבות ארוכות / ספירת אות / חפיפת מילים</title>
<a href="https://mechon-mamre.org/i/t/t0.htm" target="_blank">תנ"ך</a>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700&family=Frank+Ruhl+Libre:wght@700&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "lucide-react": "https://esm.sh/lucide-react@0.344.0"
    }
  }
  </script>

  <style>
    body { font-family: 'Assistant', sans-serif; background-color: #f8f7f2; }
    .tanakh-font { font-family: 'Frank Ruhl Libre', serif; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Trash2, Bookmark, Save, SlidersHorizontal, MapPin, Loader2, AlertCircle,
      Sparkles, TextSearch, Sigma, Link2
    } from 'lucide-react';

    // ---------- Utils ----------
    function cleanForComparison(text) {
      return (text || '')
        .replace(/ך/g, 'כ').replace(/ם/g, 'מ').replace(/ן/g, 'נ').replace(/ף/g, 'פ').replace(/ץ/g, 'צ')
        .replace(/[\u0591-\u05C7]/g, '')          // ניקוד/טעמים
        .replace(/[^\u05D0-\u05EA]/g, '');        // רק אותיות עבריות
    }

    // ✅ מוחק כל סימון מסורה בצורה {X} כולל {ס}{ר}{פ}{ש} ועוד
    function stripMasoraMarkers(s) {
      return String(s || '').replace(/\{[^}]*\}/g, ' ');
    }

    // ✅ מסיר "טו,ח" / "יד,יד" מהטקסט לחישוב
    function stripVerseRefs(s) {
      return String(s || '')
        .replace(/^\s*[א-ת]{1,4},[א-ת]{1,3}\s+/g, '')
        .replace(/\s+[א-ת]{1,4},[א-ת]{1,3}\s+/g, ' ');
    }

    // ✅ לא לפצל פסוקים בגלל Enter בתוך פסוק
    function splitIntoVerses(rawText) {
      const t0 = String(rawText || '')
        .replace(/\r/g, '')
        .replace(/\n+/g, ' ');

      const t1 = stripMasoraMarkers(t0);

      // שורה חדשה רק לפני "טו,ז" "טו,ח" וכו'
      const t2 = t1.replace(/(\s|^)([א-ת]{1,4},[א-ת]{1,3})(?=\s)/g, '\n$2 ');

      return t2
        .split(/[\n׃]+/g)
        .map(s => s.replace(/\s+/g, ' ').trim())
        .filter(Boolean);
    }

    function isPalindrome(str) {
      const clean = cleanForComparison(str);
      return clean.length >= 3 && clean === clean.split('').reverse().join('');
    }

    function extractWords(line) {
      return (String(line || '').match(/[\u05D0-\u05EA][\u05D0-\u05EA\u0591-\u05C7]*/g) || []);
    }

    // ---------- Letter Count ----------
    function normalizeHebrewLetter(input) {
      const clean = cleanForComparison(input || '');
      return clean[0] || '';
    }

    function countLetterInText(text, letter) {
      const v = cleanForComparison(text);
      if (!letter) return 0;
      let c = 0;
      for (const ch of v) if (ch === letter) c++;
      return c;
    }

    const finalMap = { 'כ': 'ך', 'מ': 'ם', 'נ': 'ן', 'פ': 'ף', 'צ': 'ץ' };

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function highlightLetterHtml(verse, letter) {
      if (!letter) return escapeHtml(verse);
      const variants = new Set([letter, finalMap[letter]].filter(Boolean));
      const cls = 'px-1 rounded bg-emerald-200 font-bold text-stone-800';
      const chars = Array.from(variants).join('');
      const re = new RegExp(`[${chars}]`, 'g');
      const safe = escapeHtml(verse);
      return safe.replace(re, (m) => `<span class="${cls}">${m}</span>`);
    }

    // ---------- Overlap ----------
    function maxOverlapSuffixPrefix(normA, normB) {
      if (!normA || !normB) return 0;
      const maxK = Math.min(normA.length, normB.length);
      for (let k = maxK; k >= 1; k--) {
        if (normA.slice(normA.length - k) === normB.slice(0, k)) return k;
      }
      return 0;
    }

    function yieldToUI() { return new Promise(r => setTimeout(r, 0)); }

    // ---------- App ----------
    function App() {
      const [inputText, setInputText] = React.useState('');
      const [results, setResults] = React.useState([]);

      const [mode, setMode] = React.useState('pal'); // pal | long | letterCount | overlap
      const [favorites, setFavorites] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('pal_favs') || '[]'); } catch { return []; }
      });

      const [apiKey, setApiKey] = React.useState(localStorage.getItem('gemini_key') || '');
      const [loadingId, setLoadingId] = React.useState(null);

      // Pal
      const [minLength, setMinLength] = React.useState(3);
      const [crossVerseEnabled, setCrossVerseEnabled] = React.useState(true);
      const [crossVerseWindow, setCrossVerseWindow] = React.useState(1);

      // Long
      const [longMinLength, setLongMinLength] = React.useState(8);
      const [longTopN, setLongTopN] = React.useState(50);

      // LetterCount
      const [letterToCount, setLetterToCount] = React.useState('ה');
      const [targetCount, setTargetCount] = React.useState(19);
      const [countMode, setCountMode] = React.useState('exact'); // exact | atLeast | atMost | none

      // Overlap
      const [overlapMin, setOverlapMin] = React.useState(1);
      const [overlapView, setOverlapView] = React.useState('chains'); // chains | pairs

      // Loader + %
      const [isSearching, setIsSearching] = React.useState(false);
      const [progressPct, setProgressPct] = React.useState(0);
      const [progressText, setProgressText] = React.useState('');

      React.useEffect(() => {
        localStorage.setItem('pal_favs', JSON.stringify(favorites));
      }, [favorites]);

      const toggleFavorite = (item) => {
        const isFav = favorites.some(f => f.text === item.text && f.kind === item.kind);
        setFavorites(isFav ? favorites.filter(f => !(f.text === item.text && f.kind === item.kind)) : [...favorites, item]);
      };

      const exportCsv = () => {
        const csv =
          "סוג,טקסט,מדד,מקור,פסוק,פרטים\n" +
          favorites.map(f => {
            const kindLabel =
              f.kind === 'pal' ? 'פלינדרום' :
              (f.kind === 'long' ? 'תיבה ארוכה' :
              (f.kind === 'letterCount' ? 'ספירת אות' : 'חפיפת מילים'));
            const metricLabel =
              f.kind === 'letterCount' ? `${(f.meta?.displayLetter ?? '')}×${f.length}` : String(f.length);
            const details = f.meta?.details || '';
            const safe = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
            return [kindLabel, f.text, metricLabel, f.location, f.sourceText, details].map(safe).join(',');
          }).join("\n");

        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "results.csv";
        link.click();
      };

      const identifySource = async (itemIndexInResults) => {
        if (!apiKey) { alert('אנא הזן מפתח API'); return; }
        const item = results[itemIndexInResults];
        if (!item) return;

        setLoadingId(item.id);
        try {
          const base =
            item.kind === 'pal'
              ? `זהה את המקור המדויק (ספר, פרק, פסוק) של הרצף בתנ"ך: "${item.text}"`
              : item.kind === 'long'
                ? `זהה את המקור המדויק (ספר, פרק, פסוק) של התיבה/מילה בתנ"ך: "${item.text}"`
                : `זהה את המקור המדויק (ספר, פרק, פסוק) של הפסוק הבא בתנ"ך: "${item.sourceText}"`;

          const extra =
            item.kind === 'pal' && item.meta?.crossVerse
              ? `שים לב: הרצף חוצה בין שני פסוקים סמוכים. פסוק 1: "${item.meta.verseA}". פסוק 2: "${item.meta.verseB}".`
              : '';

          const prompt = `${base}. ${extra} החזר רק "ספר פרק:פסוק" (למשל: שמות ב:יג).`;

          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }
          );

          const data = await response.json();
          const location = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
          setResults(prev => prev.map(r => r.id === item.id ? { ...r, location: location || 'לא נמצא' } : r));
        } catch {
          setResults(prev => prev.map(r => r.id === item.id ? { ...r, location: 'לא נמצא' } : r));
        } finally {
          setLoadingId(null);
        }
      };

      // ✅ מבנה פסוק: תצוגה נקייה + טקסט לחישוב (גם בלי "טו,ח")
      function getVerseForms(v) {
        const verseRaw = String(v || '').trim();
        const verseDisplay = stripMasoraMarkers(verseRaw).replace(/\s+/g, ' ').trim();
        const verseScan = stripVerseRefs(verseDisplay).replace(/\s+/g, ' ').trim();
        return { verseRaw, verseDisplay, verseScan };
      }

      const handleAnalyze = async () => {
        const verses = splitIntoVerses(inputText || '');

        setIsSearching(true);
        setProgressPct(0);
        setProgressText(
          mode === 'pal' ? 'מחפש פלינדרומים…' :
          mode === 'long' ? 'מחפש תיבות ארוכות…' :
          mode === 'overlap' ? 'מחפש חפיפות בין מילים…' :
          'סופר אות בפסוקים…'
        );

        await yieldToUI();

        try {
          if (!verses.length) { setResults([]); return; }

          // ---------- PAL ----------
          if (mode === 'pal') {
            const found = [];
            const seen = new Set();
            const total = verses.length;

            const scanTextForPalindromes = (textToScan, sourceTextForDisplay, opts) => {
              const mustCross = !!opts?.mustCrossBoundary;
              const boundaryIndex = opts?.boundaryIndex ?? 0;
              const meta = opts?.meta || {};

              for (let len = 3; len <= 50; len++) {
                for (let i = 0; i <= textToScan.length - len; i++) {
                  const sub = textToScan.substring(i, i + len);
                  if (!isPalindrome(sub)) continue;
                  if (mustCross) {
                    const start = i, end = i + len;
                    if (!(start < boundaryIndex && end > boundaryIndex)) continue;
                  }
                  const cleanSub = sub.trim();
                  const compareKey = cleanForComparison(cleanSub);
                  if (!compareKey || seen.has(compareKey)) continue;
                  seen.add(compareKey);
                  found.push({
                    kind: 'pal',
                    text: cleanSub,
                    sourceText: sourceTextForDisplay,
                    location: 'לחץ לזיהוי מקור',
                    length: compareKey.length,
                    meta,
                    id: Math.random()
                  });
                }
              }
            };

            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              scanTextForPalindromes(verseScan, verseDisplay, { meta: { crossVerse: false } });

              if (crossVerseEnabled && crossVerseWindow >= 1) {
                const w = Math.max(1, Math.min(3, crossVerseWindow | 0));
                for (let k = 1; k <= w; k++) {
                  if (vi + k >= total) break;

                  const a = getVerseForms(verses[vi]);
                  const b = getVerseForms(verses[vi + k]);

                  const combinedScan = a.verseScan + ' ' + b.verseScan;
                  const combinedDisplay = a.verseDisplay + ' ' + b.verseDisplay;
                  const boundaryIndex = a.verseScan.length + 1;

                  scanTextForPalindromes(combinedScan, combinedDisplay, {
                    mustCrossBoundary: true,
                    boundaryIndex,
                    meta: { crossVerse: true, verseA: a.verseDisplay, verseB: b.verseDisplay }
                  });
                }
              }

              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 3) === 2) await yieldToUI();
            }

            setResults(found);
            return;
          }

          // ---------- LONG ----------
          if (mode === 'long') {
            const found = [];
            const seen = new Set();
            const total = verses.length;

            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              const wordsOrig = extractWords(verseScan.replace(/[-–—]/g, ' '));

              for (const w of wordsOrig) { // ✅ היה אצלך "words" וזה שגוי
                const clean = cleanForComparison(w);
                if (clean.length >= longMinLength && !seen.has(clean)) {
                  seen.add(clean);
                  found.push({
                    kind: 'long',
                    text: w.trim(),
                    sourceText: verseDisplay,
                    location: 'לחץ לזיהוי מקור',
                    length: clean.length,
                    meta: { crossVerse: false },
                    id: Math.random()
                  });
                }
              }

              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 10) === 9) await yieldToUI();
            }

            found.sort((a, b) => b.length - a.length);
            setResults(found.slice(0, Math.max(1, longTopN | 0)));
            return;
          }

          // ---------- LETTER COUNT ----------
          if (mode === 'letterCount') {
            const letter = normalizeHebrewLetter(letterToCount);
            if (!letter) { setResults([]); return; }

            const found = [];
            const seen = new Set();
            const total = verses.length;

            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              const cnt = countLetterInText(verseScan, letter);

              const ok =
                countMode === 'none'    ? (cnt === 0) :
                countMode === 'exact'   ? (cnt === targetCount) :
                countMode === 'atLeast' ? (cnt >= targetCount) :
                                         (cnt <= targetCount);

              if (ok) {
                const key = cleanForComparison(verseScan);
                if (!seen.has(key)) {
                  seen.add(key);

                  const label = (countMode === 'none')
                    ? `אין "${letterToCount}"`
                    : `${letterToCount} × ${cnt}`;

                  found.push({
                    kind: 'letterCount',
                    text: label,
                    sourceText: verseDisplay,
                    location: 'לחץ לזיהוי מקור',
                    length: cnt,
                    meta: { letter, displayLetter: letterToCount, crossVerse: false },
                    id: Math.random()
                  });
                }
              }

              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 20) === 19) await yieldToUI();
            }

            found.sort((a, b) => b.length - a.length);
            setResults(found);
            return;
          }

          // ---------- OVERLAP ----------
          if (mode === 'overlap') {
            const found = [];
            const seen = new Set();
            const total = verses.length;
            const minK = Math.max(1, Math.min(10, overlapMin | 0));

            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);

              // ✅ מקפים יהפכו לרווח כדי שהמילים יתפצלו נכון
              const wordsOrig = extractWords(verseScan.replace(/[-–—]/g, ' '));

              const words = wordsOrig.map(w => ({ orig: w, norm: cleanForComparison(w) })).filter(w => w.norm);

              if (words.length >= 2) {
                if (overlapView === 'pairs') {
                  for (let i = 0; i < words.length - 1; i++) {
                    const a = words[i], b = words[i + 1];
                    const k = maxOverlapSuffixPrefix(a.norm, b.norm);
                    if (k < minK) continue;

                    const overlap = a.norm.slice(a.norm.length - k);
                    const key = `${vi}|pair|${i}|${overlap}|${a.norm}|${b.norm}`;
                    if (seen.has(key)) continue;
                    seen.add(key);

                    found.push({
                      kind: 'overlap',
                      text: `${a.orig} → ${b.orig}`,
                      sourceText: verseDisplay,
                      location: 'לחץ לזיהוי מקור',
                      length: k,           // K
                      wordCount: 2,        // ✅ מספר מילים חופפות
                      _ord: (vi * 100000) + i, // ✅ סדר הופעה
                      meta: { details: `חפיפה: "${overlap}" (${k})` },
                      id: Math.random()
                    });
                  }
                } else {
                  let chainStart = 0;
                  let currentOverlaps = [];

                  const flushChain = (endExclusive) => {
                    const chainWords = words.slice(chainStart, endExclusive).map(w => w.orig);
                    if (chainWords.length < 2) return;

                    const minOverlapInChain = currentOverlaps.length ? Math.min(...currentOverlaps) : 0;
                    const maxOverlapInChain = currentOverlaps.length ? Math.max(...currentOverlaps) : 0;

                    const key = `${vi}|chain|${chainStart}|${endExclusive}|${chainWords.join('|')}|${minOverlapInChain}|${maxOverlapInChain}`;
                    if (seen.has(key)) return;
                    seen.add(key);

                    found.push({
                      kind: 'overlap',
                      text: chainWords.join(' → '),
                      sourceText: verseDisplay,
                      location: 'לחץ לזיהוי מקור',
                      length: maxOverlapInChain || minK,     // ✅ מיון לפי מקסימום K
                      wordCount: chainWords.length,          // ✅ מספר מילים בשרשרת
                      _ord: (vi * 100000) + chainStart,      // ✅ סדר הופעה
                      meta: { details: `שרשרת: ${chainWords.length} מילים • חפיפה מקסימלית: ${maxOverlapInChain || minK} • מינימלית: ${minOverlapInChain || minK}` },
                      id: Math.random()
                    });
                  };

                  for (let i = 0; i < words.length - 1; i++) {
                    const a = words[i], b = words[i + 1];
                    const k = maxOverlapSuffixPrefix(a.norm, b.norm);

                    if (k >= minK) currentOverlaps.push(k);
                    else {
                      flushChain(i + 1);
                      chainStart = i + 1;
                      currentOverlaps = [];
                    }
                  }
                  flushChain(words.length);
                }
              }

              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 12) === 11) await yieldToUI();
            }

            // ✅ מיון: K יורד → wordCount יורד → סדר הופעה עולה
			found.sort((a, b) =>
			  (b.wordCount|0) - (a.wordCount|0) ||   // ✅ קודם: שרשרת גדולה יותר
			  (b.length|0) - (a.length|0) ||         // ✅ אחר כך: חפיפה (K) גדולה יותר
			  (a._ord|0) - (b._ord|0)                // ✅ שובר שוויון: סדר הופעה בטקסט
			);


            setResults(found);
            return;
          }

          setResults([]);

        } finally {
          setProgressPct(100);
          setIsSearching(false);
          setProgressText('');
        }
      };

      // ---------- UI bits ----------
      const filteredResults = (mode === 'pal') ? results.filter(r => r.length >= minLength) : results;

      const ModeButton = ({ value, icon, label }) => {
        const active = mode === value;
        return React.createElement('button', {
          onClick: () => { if (!isSearching) { setMode(value); setResults([]); } },
          disabled: isSearching,
          className:
            'flex items-center gap-2 px-4 py-2 rounded-xl border text-sm font-bold transition-all ' +
            (active ? 'bg-amber-700 text-white border-amber-700 shadow' : 'bg-white text-stone-700 border-stone-200 hover:bg-stone-50') +
            (isSearching ? ' opacity-60 cursor-not-allowed' : '')
        }, icon, label);
      };

      const kindChip = (kind) => {
        const cls =
          kind === 'pal' ? 'bg-amber-100 text-amber-800'
          : kind === 'long' ? 'bg-sky-100 text-sky-800'
          : kind === 'letterCount' ? 'bg-teal-100 text-teal-800'
          : 'bg-violet-100 text-violet-800';

        const label =
          kind === 'pal' ? 'פלינדרום'
          : kind === 'long' ? 'תיבה ארוכה'
          : kind === 'letterCount' ? 'ספירת אות'
          : 'חפיפת מילים';

        return React.createElement('span', { className: `text-[10px] font-bold px-2 py-1 rounded-full ${cls}` }, label);
      };

      const actionLabel =
        mode === 'pal' ? 'נתח פלינדרומים'
        : mode === 'long' ? 'מצא תיבות ארוכות'
        : mode === 'overlap' ? 'מצא חפיפות מילים'
        : 'מצא פסוקים לפי ספירת אות';

      const metricLabelForCard = (res) => {
        if (res.kind === 'letterCount') return `${res.length} מופעים`;
        if (res.kind === 'overlap') {
          const wc = res.wordCount || (res.text?.includes('→') ? res.text.split('→').length : 2);
          return `אורך חפיפה: ${res.length} • מילים: ${wc}`;
        }
        return `${res.length} אותיות`;
      };

      const emptyHint = () => {
        if (mode === 'letterCount') return 'אין תוצאות — הדבק טקסט, בחר אות/תנאי ולחץ "מצא".';
        if (mode === 'overlap') return 'אין תוצאות — הדבק טקסט, בחר מינימום חפיפה ולחץ "מצא".';
        return 'אין תוצאות — הדבק טקסט ולחץ "מצא".';
      };

      return React.createElement('div', { className: 'max-w-6xl mx-auto p-4 md:p-8' },

        React.createElement('header', { className: 'text-center mb-8' },
          React.createElement('h1', { className: 'text-4xl font-bold tanakh-font text-stone-800' },
            'מגלה פלינדרומים / תיבות ארוכות / ספירת אות / חפיפת מילים'
          ),
          React.createElement('div', { className: 'mt-4 flex flex-col items-center gap-3' },
            React.createElement('div', { className: 'flex flex-wrap justify-center gap-2' },
              React.createElement(ModeButton, { value: 'pal', icon: React.createElement(Sparkles, { size: 16 }), label: 'פלינדרומים' }),
              React.createElement(ModeButton, { value: 'long', icon: React.createElement(TextSearch, { size: 16 }), label: 'תיבות ארוכות' }),
