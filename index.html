<body>
  <div class="max-w-6xl mx-auto px-4 pt-3">
    <a href="https://mechon-mamre.org/i/t/t0.htm" target="_blank" class="text-sm text-amber-800 underline">תנ"ך</a>
  </div>
  <div id="root"></div>

  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      Trash2, Bookmark, Save, SlidersHorizontal, MapPin, Loader2, AlertCircle,
      Sparkles, TextSearch, Sigma, Link2
    } from 'lucide-react';

    // ---------- Utils ----------
    function cleanForComparison(text) {
      return (text || '')
        .replace(/ך/g, 'כ').replace(/ם/g, 'מ').replace(/ן/g, 'נ').replace(/ף/g, 'פ').replace(/ץ/g, 'צ')
        .replace(/[\u0591-\u05C7]/g, '')
        .replace(/[^\u05D0-\u05EA]/g, '');
    }

    function stripMasoraMarkers(s) {
      return String(s || '').replace(/\{[^}]*\}/g, ' ');
    }

    function stripVerseRefs(s) {
      return String(s || '')
        .replace(/^\s*[א-ת]{1,4},[א-ת]{1,3}\s+/g, '')
        .replace(/\s+[א-ת]{1,4},[א-ת]{1,3}\s+/g, ' ');
    }

    function splitIntoVerses(rawText) {
      const t0 = String(rawText || '')
        .replace(/\r/g, '')
        .replace(/\n+/g, ' ');

      const t1 = stripMasoraMarkers(t0);
      const t2 = t1.replace(/(\s|^)([א-ת]{1,4},[א-ת]{1,3})(?=\s)/g, '\n$2 ');

      return t2
        .split(/[\n׃]+/g)
        .map(s => s.replace(/\s+/g, ' ').trim())
        .filter(Boolean);
    }

    function isPalindrome(str) {
      const clean = cleanForComparison(str);
      return clean.length >= 3 && clean === clean.split('').reverse().join('');
    }

    function extractWords(line) {
      return (String(line || '').match(/[\u05D0-\u05EA][\u05D0-\u05EA\u0591-\u05C7]*/g) || []);
    }

    function normalizeHebrewLetter(input) {
      const clean = cleanForComparison(input || '');
      return clean[0] || '';
    }

    function countLetterInText(text, letter) {
      const v = cleanForComparison(text);
      if (!letter) return 0;
      let c = 0;
      for (const ch of v) if (ch === letter) c++;
      return c;
    }

    const finalMap = { 'כ': 'ך', 'מ': 'ם', 'נ': 'ן', 'פ': 'ף', 'צ': 'ץ' };

    const HEBREW_ALPHABET = [
      'א','ב','ג','ד','ה','ו','ז','ח','ט','י',
      'כ','ל','מ','נ','ס','ע','פ','צ','ק','ר','ש','ת'
    ];

    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    function highlightLetterHtml(verse, letter) {
      if (!letter) return escapeHtml(verse);
      const variants = new Set([letter, finalMap[letter]].filter(Boolean));
      const cls = 'px-1 rounded bg-emerald-200 font-bold text-stone-800';
      const chars = Array.from(variants).join('');
      const re = new RegExp(`[${chars}]`, 'g');
      const safe = escapeHtml(verse);
      return safe.replace(re, (m) => `<span class="${cls}">${m}</span>`);
    }

    function maxOverlapSuffixPrefix(normA, normB) {
      if (!normA || !normB) return 0;
      const maxK = Math.min(normA.length, normB.length);
      for (let k = maxK; k >= 1; k--) {
        if (normA.slice(normA.length - k) === normB.slice(0, k)) return k;
      }
      return 0;
    }

    // ---------- Skip Search helpers ----------
    function isHebrewLetter(ch) {
      const cp = ch.codePointAt(0);
      return cp >= 0x05D0 && cp <= 0x05EA;
    }

    function isNikud(ch) {
      const cp = ch.codePointAt(0);
      // nikud U+05B0–U+05C7, cantillation U+0591–U+05AF
      return (cp >= 0x0591 && cp <= 0x05C7);
    }

    function isSpaceOrPunct(ch) {
      if (!ch) return true;
      const cp = ch.codePointAt(0);
      return ch === ' ' || ch === '\n' || ch === '\r' ||
             cp === 0x05BE || // maqaf
             cp === 0x05C3 || // sof pasuq
             cp === 0x05C0;   // paseq
    }

    /**
     * Builds a mapping structure for skip search:
     * - normalized: only base Hebrew letters (sofit normalized), for matching
     * - normToOrig[i]: index in `original` of the i-th normalized letter
     *
     * `original` keeps ALL characters (nikud, taamim, spaces) for display.
     */
    function prepareSkipSearchSource(text) {
      const original = stripVerseRefs(stripMasoraMarkers(String(text || '')))
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n');

      let normalized = '';
      const normToOrig = [];

      for (let i = 0; i < original.length; i++) {
        const ch = original[i];
        const norm = cleanForComparison(ch);
        if (norm) {
          normalized += norm;
          normToOrig.push(i);
        }
      }

      return { original, normalized, normToOrig };
    }

    function findSkipMatches(text, targetWord, minSkip, maxSkip, direction = 'both') {
      const prepared = prepareSkipSearchSource(text);
      const source = prepared.normalized;
      const target = cleanForComparison(targetWord);

      if (!source || !target || target.length < 2) return [];

      const matches = [];
      const directions =
        direction === 'both' ? [1, -1]
        : direction === 'backward' ? [-1]
        : [1];

      for (const dir of directions) {
        for (let skip = Math.max(1, minSkip); skip <= Math.max(minSkip, maxSkip); skip++) {
          const step = skip * dir;
          for (let start = 0; start < source.length; start++) {
            let built = '';
            let indexes = [];
            let ok = true;

            for (let i = 0; i < target.length; i++) {
              const pos = start + (i * step);
              if (pos < 0 || pos >= source.length) { ok = false; break; }
              built += source[pos];
              indexes.push(pos);
            }

            if (!ok) continue;
            if (built === target) {
              matches.push({
                word: targetWord,
                normalizedWord: target,
                skip,
                direction: dir === 1 ? 'קדימה' : 'אחורה',
                indexes,
                prepared
              });
            }
          }
        }
      }

      return matches;
    }

    /**
     * Builds highlighted window HTML for a skip-search match.
     *
     * Fixed behaviour vs. old version:
     * 1. Radius expanded to include complete words (so nikud is never cut mid-word).
     * 2. Nikud/taamim that follow a highlighted base-letter are included INSIDE
     *    the highlight <span>, so the vowel points are visible on the highlighted letter.
     * 3. Single spaces between words are preserved; newlines become spaces.
     */
    function buildSkipWindowHtmlFromOriginal(originalText, normToOrig, normIndexes, radius = 80) {
      if (!originalText || !normIndexes?.length) return '';

      const origIndexes = normIndexes
        .map(i => normToOrig[i])
        .filter(i => Number.isInteger(i));

      if (!origIndexes.length) return escapeHtml(originalText);

      const minOrig = Math.min(...origIndexes);
      const maxOrig = Math.max(...origIndexes);

      // Raw window
      let start = Math.max(0, minOrig - radius);
      let end   = Math.min(originalText.length, maxOrig + radius + 1);

      // Extend to word boundaries so nikud isn't cut mid-word
      while (start > 0 && !isSpaceOrPunct(originalText[start - 1])) start--;
      while (end < originalText.length && !isSpaceOrPunct(originalText[end])) end++;

      const highlightSet = new Set(origIndexes);

      let html = '';
      if (start > 0) html += '<span class="text-stone-400">…</span>';

      let inHighlight = false;

      for (let i = start; i < end; i++) {
        const ch = originalText[i];

        if (isHebrewLetter(ch)) {
          // Close previous highlight if switching to non-highlighted letter
          if (inHighlight && !highlightSet.has(i)) {
            html += '</span>';
            inHighlight = false;
          }
          if (highlightSet.has(i) && !inHighlight) {
            html += '<span class="bg-fuchsia-300 text-stone-900 rounded font-bold" style="padding:0 2px">';
            inHighlight = true;
          }
          html += escapeHtml(ch);
        } else if (isNikud(ch)) {
          // Always emit nikud — it attaches visually to the preceding letter.
          // If we're inside a highlight span it will display ON that highlighted letter.
          html += escapeHtml(ch);
        } else {
          // Non-letter, non-nikud: close highlight span if open
          if (inHighlight) { html += '</span>'; inHighlight = false; }
          html += (ch === '\n') ? ' ' : escapeHtml(ch);
        }
      }

      if (inHighlight) html += '</span>';
      if (end < originalText.length) html += '<span class="text-stone-400">…</span>';

      return html;
    }

    function yieldToUI() {
      return new Promise(r => setTimeout(r, 0));
    }

    // ---------- App ----------
    function App() {
      const [inputText, setInputText] = React.useState('');
      const [results, setResults] = React.useState([]);

      const [mode, setMode] = React.useState('pal');
      const [favorites, setFavorites] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem('pal_favs') || '[]'); }
        catch { return []; }
      });

      const [apiKey, setApiKey] = React.useState(localStorage.getItem('gemini_key') || '');
      const [loadingId, setLoadingId] = React.useState(null);

      const [minLength, setMinLength] = React.useState(3);
      const [crossVerseEnabled, setCrossVerseEnabled] = React.useState(true);
      const [crossVerseWindow, setCrossVerseWindow] = React.useState(1);

      const [longMinLength, setLongMinLength] = React.useState(8);
      const [longTopN, setLongTopN] = React.useState(50);

      const [letterToCount, setLetterToCount] = React.useState('ה');
      const [targetCount, setTargetCount] = React.useState(19);
      const [countMode, setCountMode] = React.useState('exact');

      const [overlapMin, setOverlapMin] = React.useState(1);
      const [overlapView, setOverlapView] = React.useState('chains');

      const [skipWord, setSkipWord] = React.useState('');
      const [skipMin, setSkipMin] = React.useState(1);
      const [skipMax, setSkipMax] = React.useState(20);
      const [skipDirection, setSkipDirection] = React.useState('both');

      const [isSearching, setIsSearching] = React.useState(false);
      const [progressPct, setProgressPct] = React.useState(0);
      const [progressText, setProgressText] = React.useState('');

      React.useEffect(() => {
        localStorage.setItem('pal_favs', JSON.stringify(favorites));
      }, [favorites]);

      const toggleFavorite = (item) => {
        const isFav = favorites.some(f => f.text === item.text && f.kind === item.kind);
        setFavorites(isFav
          ? favorites.filter(f => !(f.text === item.text && f.kind === item.kind))
          : [...favorites, item]);
      };

      const exportCsv = () => {
        const csv =
          "סוג,טקסט,מדד,מקור,פסוק,פרטים\n" +
          favorites.map(f => {
            const kindLabel =
              f.kind === 'pal' ? 'פלינדרום' :
              f.kind === 'long' ? 'תיבה ארוכה' :
              f.kind === 'letterCount' ? 'ספירת אות' :
              f.kind === 'skipSearch' ? 'דילוגי אותיות' : 'חפיפת מילים';
            const metricLabel = f.kind === 'letterCount'
              ? `${(f.meta?.displayLetter ?? '')}×${f.length}` : String(f.length);
            const details = f.meta?.details || '';
            const safe = (v) => `"${String(v ?? '').replace(/"/g, '""')}"`;
            return [kindLabel, f.text, metricLabel, f.location, f.sourceText, details].map(safe).join(',');
          }).join("\n");

        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "results.csv";
        link.click();
      };

      const identifySource = async (itemIndexInResults) => {
        if (!apiKey) { alert('אנא הזן מפתח API'); return; }
        const item = results[itemIndexInResults];
        if (!item || item.kind === 'skipSearch') return;
        setLoadingId(item.id);
        try {
          const base =
            item.kind === 'pal' ? `זהה את המקור המדויק (ספר, פרק, פסוק) של הרצף בתנ"ך: "${item.text}"`
            : item.kind === 'long' ? `זהה את המקור המדויק (ספר, פרק, פסוק) של התיבה/מילה בתנ"ך: "${item.text}"`
            : `זהה את המקור המדויק (ספר, פרק, פסוק) של הפסוק הבא בתנ"ך: "${item.sourceText}"`;

          const extra = item.kind === 'pal' && item.meta?.crossVerse
            ? `שים לב: הרצף חוצה בין שני פסוקים סמוכים. פסוק 1: "${item.meta.verseA}". פסוק 2: "${item.meta.verseB}".`
            : '';

          const prompt = `${base}. ${extra} החזר רק "ספר פרק:פסוק" (למשל: שמות ב:יג).`;
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
            { method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) }
          );
          const data = await response.json();
          const location = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim();
          setResults(prev => prev.map(r => r.id === item.id ? { ...r, location: location || 'לא נמצא' } : r));
        } catch {
          setResults(prev => prev.map(r => r.id === item.id ? { ...r, location: 'לא נמצא' } : r));
        } finally {
          setLoadingId(null);
        }
      };

      function getVerseForms(v) {
        const verseRaw = String(v || '').trim();
        const verseDisplay = stripMasoraMarkers(verseRaw).replace(/\s+/g, ' ').trim();
        const verseScan = stripVerseRefs(verseDisplay).replace(/\s+/g, ' ').trim();
        return { verseRaw, verseDisplay, verseScan };
      }

      const handleAnalyzeAlphabet = async () => {
        const verses = splitIntoVerses(inputText || '');
        setIsSearching(true); setProgressPct(0); setProgressText('רץ על כל האלפבית…');
        await yieldToUI();
        try {
          if (!verses.length) { setResults([]); return; }
          const found = [];
          const totalSteps = verses.length * HEBREW_ALPHABET.length;
          let step = 0;
          for (const letterDisplay of HEBREW_ALPHABET) {
            const letter = normalizeHebrewLetter(letterDisplay);
            const seen = new Set();
            for (let vi = 0; vi < verses.length; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              const cnt = countLetterInText(verseScan, letter);
              const ok = countMode === 'none' ? (cnt === 0) : countMode === 'exact' ? (cnt === targetCount) : countMode === 'atLeast' ? (cnt >= targetCount) : (cnt <= targetCount);
              if (ok) {
                const key = `${letter}|${cleanForComparison(verseScan)}`;
                if (!seen.has(key)) {
                  seen.add(key);
                  const label = countMode === 'none' ? `אין "${letterDisplay}"` : `${letterDisplay} × ${cnt}`;
                  found.push({ kind: 'letterCount', text: label, sourceText: verseDisplay, location: 'לחץ לזיהוי מקור', length: cnt, wordCount: 1, meta: { letter, displayLetter: letterDisplay, crossVerse: false, details: `אות: ${letterDisplay}` }, id: Math.random() });
                }
              }
              step++;
              setProgressPct(Math.round((step / totalSteps) * 100));
              if ((step % 40) === 0) await yieldToUI();
            }
          }
          found.sort((a, b) => (b.length | 0) - (a.length | 0) || String(a.meta?.displayLetter || '').localeCompare(String(b.meta?.displayLetter || ''), 'he'));
          setResults(found);
        } finally {
          setProgressPct(100); setIsSearching(false); setProgressText('');
        }
      };

      const handleAnalyze = async () => {
        const verses = splitIntoVerses(inputText || '');
        setIsSearching(true); setProgressPct(0);
        setProgressText(
          mode === 'pal' ? 'מחפש פלינדרומים…' :
          mode === 'long' ? 'מחפש תיבות ארוכות…' :
          mode === 'overlap' ? 'מחפש חפיפות בין מילים…' :
          mode === 'skipSearch' ? 'מחפש דילוגי אותיות…' :
          'סופר אות בפסוקים…'
        );
        await yieldToUI();

        try {
          if (!verses.length && mode !== 'skipSearch') { setResults([]); return; }

          // ---- SKIP SEARCH ----
          if (mode === 'skipSearch') {
            const target = cleanForComparison(skipWord);
            if (!target) { setResults([]); return; }

            const matches = findSkipMatches(inputText || '', skipWord, skipMin, skipMax, skipDirection);

            const found = matches.map((m, idx) => ({
              kind: 'skipSearch',
              text: `${skipWord} • דילוג ${m.skip} • ${m.direction}`,
              sourceText: 'חלון סביב ההתאמה',
              sourceHtml: buildSkipWindowHtmlFromOriginal(
                m.prepared.original,
                m.prepared.normToOrig,
                m.indexes,
                80
              ),
              location: 'נמצא בטווח הטקסט',
              length: m.skip,
              wordCount: m.indexes.length,
              meta: { details: `מילה: ${skipWord} • דילוג: ${m.skip} • כיוון: ${m.direction}` },
              id: Math.random() + idx
            }));

            found.sort((a, b) => (a.length | 0) - (b.length | 0) || (b.wordCount | 0) - (a.wordCount | 0));
            setResults(found);
            return;
          }

          // ---- PAL ----
          if (mode === 'pal') {
            const found = []; const seen = new Set(); const total = verses.length;
            const scanTextForPalindromes = (textToScan, sourceTextForDisplay, opts) => {
              const mustCross = !!opts?.mustCrossBoundary;
              const boundaryIndex = opts?.boundaryIndex ?? 0;
              const meta = opts?.meta || {};
              for (let len = 3; len <= 50; len++) {
                for (let i = 0; i <= textToScan.length - len; i++) {
                  const sub = textToScan.substring(i, i + len);
                  if (!isPalindrome(sub)) continue;
                  if (mustCross) { const s = i, e = i + len; if (!(s < boundaryIndex && e > boundaryIndex)) continue; }
                  const cleanSub = sub.trim();
                  const compareKey = cleanForComparison(cleanSub);
                  if (!compareKey || seen.has(compareKey)) continue;
                  seen.add(compareKey);
                  found.push({ kind: 'pal', text: cleanSub, sourceText: sourceTextForDisplay, location: 'לחץ לזיהוי מקור', length: compareKey.length, meta, id: Math.random() });
                }
              }
            };
            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              scanTextForPalindromes(verseScan, verseDisplay, { meta: { crossVerse: false } });
              if (crossVerseEnabled && crossVerseWindow >= 1) {
                const w = Math.max(1, Math.min(3, crossVerseWindow | 0));
                for (let k = 1; k <= w; k++) {
                  if (vi + k >= total) break;
                  const a = getVerseForms(verses[vi]); const b = getVerseForms(verses[vi + k]);
                  const combinedScan = a.verseScan + ' ' + b.verseScan;
                  const combinedDisplay = a.verseDisplay + ' ' + b.verseDisplay;
                  scanTextForPalindromes(combinedScan, combinedDisplay, { mustCrossBoundary: true, boundaryIndex: a.verseScan.length + 1, meta: { crossVerse: true, verseA: a.verseDisplay, verseB: b.verseDisplay } });
                }
              }
              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 3) === 2) await yieldToUI();
            }
            setResults(found); return;
          }

          // ---- LONG ----
          if (mode === 'long') {
            const found = []; const seen = new Set(); const total = verses.length;
            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              const wordsOrig = extractWords(verseScan.replace(/[-–—]/g, ' '));
              for (const w of wordsOrig) {
                const clean = cleanForComparison(w);
                if (clean.length >= longMinLength && !seen.has(clean)) {
                  seen.add(clean);
                  found.push({ kind: 'long', text: w.trim(), sourceText: verseDisplay, location: 'לחץ לזיהוי מקור', length: clean.length, meta: { crossVerse: false }, id: Math.random() });
                }
              }
              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 10) === 9) await yieldToUI();
            }
            found.sort((a, b) => b.length - a.length);
            setResults(found.slice(0, Math.max(1, longTopN | 0))); return;
          }

          // ---- LETTER COUNT ----
          if (mode === 'letterCount') {
            const letter = normalizeHebrewLetter(letterToCount);
            if (!letter) { setResults([]); return; }
            const found = []; const seen = new Set(); const total = verses.length;
            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);
              const cnt = countLetterInText(verseScan, letter);
              const ok = countMode === 'none' ? (cnt === 0) : countMode === 'exact' ? (cnt === targetCount) : countMode === 'atLeast' ? (cnt >= targetCount) : (cnt <= targetCount);
              if (ok) {
                const key = cleanForComparison(verseScan);
                if (!seen.has(key)) {
                  seen.add(key);
                  const label = countMode === 'none' ? `אין "${letterToCount}"` : `${letterToCount} × ${cnt}`;
                  found.push({ kind: 'letterCount', text: label, sourceText: verseDisplay, location: 'לחץ לזיהוי מקור', length: cnt, meta: { letter, displayLetter: letterToCount, crossVerse: false }, id: Math.random() });
                }
              }
              setProgressPct(Math.round(((vi + 1) / total) * 100));
              if ((vi % 20) === 19) await yieldToUI();
            }
            found.sort((a, b) => b.length - a.length);
            setResults(found); return;
          }

          // ---- OVERLAP ----
          if (mode === 'overlap') {
            const found = []; const seen = new Set(); const total = verses.length;
            const minK = Math.max(1, Math.min(10, overlapMin | 0));
            for (let vi = 0; vi < total; vi++) {
              const { verseDisplay, verseScan } = getVerseForms(verses[vi]);

                    const overlap = a.norm.slice(a.norm.length - k);

                    const minO = currentOverlaps.length ? Math.min(...currentOverlaps) : 0;
